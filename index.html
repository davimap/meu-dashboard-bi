<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Senai - Performance de Equipes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; color: #f1f5f9; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="dashboardWorkspace" class="max-w-7xl mx-auto space-y-8">
        <header class="flex justify-between items-center border-b border-slate-800 pb-6">
            <h1 class="text-2xl font-bold text-sky-400">Dashboard Senai: Performance de Equipes</h1>
            <span class="text-slate-400 text-sm">Dados atualizados automaticamente</span>
        </header>

        <section id="kpiGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5"></section>
        
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg">
                <canvas id="primaryChart"></canvas>
            </div>
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-lg">
                <table class="w-full text-left">
                    <thead class="text-slate-400 text-xs uppercase">
                        <tr><th class="py-3">Equipe</th><th class="py-3">Estrelas</th></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Dados embutidos da sua planilha
        const embeddedData = [
            {"Estrelas":20,"Equipe":"AlphaTurbo"},
            {"Estrelas":27,"Equipe":"Circuito Final"},
            {"Estrelas":20,"Equipe":"Delta 5"},
            {"Estrelas":27,"Equipe":"Eletrotech"},
            {"Estrelas":29,"Equipe":"Fator 5"},
            {"Estrelas":29,"Equipe":"InovaTech"},
            {"Estrelas":31,"Equipe":"PowerTeam"},
            {"Estrelas":31,"Equipe":"Voltagem Máxima"}
        ];

        function initDashboard() {
            // Render KPIs
            const totalEstrelas = embeddedData.reduce((acc, curr) => acc + curr.Estrelas, 0);
            const grid = document.getElementById('kpiGrid');
            grid.innerHTML = `
                <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                    <p class="text-slate-400 text-xs">TOTAL DE ESTRELAS</p>
                    <p class="text-3xl font-bold text-white">${totalEstrelas}</p>
                </div>
            `;

            // Render Table
            const tbody = document.getElementById('tableBody');
            embeddedData.sort((a,b) => b.Estrelas - a.Estrelas).forEach(item => {
                tbody.innerHTML += `<tr><td class="py-3">${item.Equipe}</td><td class="py-3 font-bold text-sky-400">${item.Estrelas}</td></tr>`;
            });

            // Render Chart
            new Chart(document.getElementById('primaryChart'), {
                type: 'bar',
                data: {
                    labels: embeddedData.map(i => i.Equipe),
                    datasets: [{ label: 'Estrelas por Equipe', data: embeddedData.map(i => i.Estrelas), backgroundColor: '#38bdf8' }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        window.onload = initDashboard;
    </script>
</body>
</html>
